# Production-style Compose for the install script (GHCR image).
# Fetched on install/update when NOVACODE_INSTALL_BASE_URL is set; keep in sync with scripts/install.sh embed.
#
# Extra host→container mounts go in docker-compose.override.yml (generated by install.sh).

services:
  novacode:
    image: ${NOVACODE_IMAGE:-ghcr.io/surfingbytes/novacode:latest}
    ports:
      - "${PORT:-3030}:3030"
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - novacode
    environment:
      UID: ${UID}
      GID: ${GID}
      JWT_SECRET: ${JWT_SECRET}
      PORT: ${PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
    volumes:
      - ${NOVACODE_CONFIG_DIR}:/config

  postgres:
    image: postgres:17
    ports:
      - "127.0.0.1:${POSTGRES_PUBLISH_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ${NOVACODE_POSTGRES_DATA_DIR}:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - novacode

networks:
  novacode:
    driver: bridge
