name: Sync upstream

on:
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: upstream-sync
  cancel-in-progress: true

jobs:
  sync:
    if: ${{ github.repository != 'JonahFintzDev/novacode' }}
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.UPSTREAM_SYNC_TOKEN || secrets.GITHUB_TOKEN }}
      MIRROR_BRANCH: main
      RELEASE_BRANCH: release
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6
        with:
          fetch-depth: 0
          token: ${{ secrets.UPSTREAM_SYNC_TOKEN || secrets.GITHUB_TOKEN }}
      - name: Sync fork main from upstream
        id: sync-main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git remote add upstream https://github.com/JonahFintzDev/novacode.git
          git fetch origin "$MIRROR_BRANCH"
          git fetch upstream "$MIRROR_BRANCH"
          git switch -C "$MIRROR_BRANCH" "upstream/$MIRROR_BRANCH"

          if [ "$(git rev-parse "origin/$MIRROR_BRANCH")" = "$(git rev-parse HEAD)" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Fork main already matches upstream main."
            exit 0
          fi

          git push --force-with-lease origin "HEAD:$MIRROR_BRANCH"
          echo "changed=true" >> "$GITHUB_OUTPUT"
      - name: Open or update release PR
        run: |
          git fetch origin "$MIRROR_BRANCH"

          if ! git fetch origin "$RELEASE_BRANCH"; then
            echo "Release branch '$RELEASE_BRANCH' does not exist. Create it before enabling release sync." >&2
            exit 1
          fi

          if git merge-base --is-ancestor "origin/$MIRROR_BRANCH" "origin/$RELEASE_BRANCH"; then
            echo "Release already contains fork main."
            exit 0
          fi

          body_file="$RUNNER_TEMP/upstream-sync-body.md"
          cat > "$body_file" <<'EOF'
          This PR merges the latest fork `main` into `release`.

          Fork `main` is mirrored from `JonahFintzDev/novacode:main`; `release` contains this fork's personal Docker build changes and any local feature branches.
          EOF

          existing_pr="$(gh pr list \
            --base "$RELEASE_BRANCH" \
            --head "${GITHUB_REPOSITORY_OWNER}:$MIRROR_BRANCH" \
            --state open \
            --json number \
            --jq '.[0].number')"

          if [ -n "$existing_pr" ]; then
            gh pr edit "$existing_pr" \
              --title "chore: sync main into release" \
              --body-file "$body_file"
          else
            gh pr create \
              --base "$RELEASE_BRANCH" \
              --head "$MIRROR_BRANCH" \
              --title "chore: sync main into release" \
              --body-file "$body_file"
          fi
