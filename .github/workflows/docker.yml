name: Docker image

on:
  workflow_dispatch:
  push:
    branches:
      - release
    paths:
      - 'api/**'
      - 'dashboard/**'
      - 'Dockerfile'
      - '.github/workflows/docker.yml'
  pull_request:
    paths:
      - 'api/**'
      - 'dashboard/**'
      - 'Dockerfile'
      - '.github/workflows/docker.yml'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: surfingbytes/novacode
  RELEASE_BRANCH: release

jobs:
  test-build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: api/package-lock.json

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Prepare .env for Docker build
        run: cp .env.example .env

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.ref == format('refs/heads/{0}', env.RELEASE_BRANCH)
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', env.RELEASE_BRANCH) }}
            type=sha
            type=ref,event=branch

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: ${{ github.ref == format('refs/heads/{0}', env.RELEASE_BRANCH) }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
