# API runs via entrypoint: chowns /config to your uid/gid, then runs app as that user.
# Set in .env or export: UID=$(id -u) GID=$(id -g)
name: nova-code-dev
services:
  api:
    build:
      context: .
      dockerfile: api/Dockerfile.dev
    ports:
      - "21000:21000"
    environment:
      UID: "${UID:-1000}"
      GID: "${GID:-1000}"
      NODE_ENV: development
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set}
      PORT: 21000
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: novacode
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
    volumes:
      - ./api/src:/app/src
      - ./config:/config
      - ~:/data-root
    restart: unless-stopped
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile.dev
    ports:
      - "21001:8080"
    environment:
      NODE_ENV: development
      VITE_API_URL: http://localhost:21000/api
    volumes:
      - ./dashboard/src:/app/src
      - ./dashboard/public:/app/public
      - ./dashboard/index.html:/app/index.html
    depends_on:
      - api
    restart: unless-stopped
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: novacode
    volumes:
      - ai-postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  ai-postgres-data:
